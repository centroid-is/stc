name: Coverage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  coverage:
    name: Test Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      # ---------- Unit test coverage (standard go test) ----------
      - name: Run unit tests with coverage
        run: |
          go test -coverprofile=unit.txt -covermode=atomic \
            -coverpkg=./... ./... -count=1 -timeout 5m

      # ---------- Exec-based test coverage (cmd/stc) ----------
      - name: Run exec-based tests with coverage
        run: |
          mkdir -p /tmp/stc-covdata
          GOCOVERDIR=/tmp/stc-covdata go test ./cmd/stc/ -count=1 -timeout 5m

      # ---------- Convert exec coverage to text format ----------
      - name: Convert exec coverage
        run: |
          if ls /tmp/stc-covdata/covcounters.* &>/dev/null; then
            go tool covdata textfmt -i=/tmp/stc-covdata -o=exec.txt
          fi

      # ---------- Merge profiles ----------
      - name: Merge coverage profiles
        run: |
          # Start with the unit coverage as the base.
          cp unit.txt coverage.txt

          # Append exec coverage if it exists (skip the "mode:" header line).
          if [ -f exec.txt ]; then
            tail -n +2 exec.txt >> coverage.txt
          fi

      # ---------- Coverage threshold enforcement (blocking gate) ----------
      - name: Enforce coverage thresholds
        uses: vladopajic/go-test-coverage@v2
        with:
          config: .testcoverage.yml
          profile: coverage.txt

      # ---------- Upload to Codecov (non-blocking) ----------
      - name: Upload to Codecov
        continue-on-error: true
        uses: codecov/codecov-action@v4
        with:
          files: coverage.txt
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
