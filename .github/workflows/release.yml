name: Release

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}/${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            runner: ubuntu-latest
            ext: ''
          - os: linux
            arch: arm64
            runner: ubuntu-latest
            ext: ''
          - os: darwin
            arch: amd64
            runner: macos-latest
            ext: ''
          - os: darwin
            arch: arm64
            runner: macos-latest
            ext: ''
          - os: windows
            arch: amd64
            runner: windows-latest
            ext: '.exe'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build stc
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: '0'
        run: |
          go build -ldflags "-s -w -X github.com/centroid-is/stc/pkg/version.Version=${{ github.event.release.tag_name }} -X github.com/centroid-is/stc/pkg/version.Commit=${{ github.sha }}" -o stc${{ matrix.ext }} ./cmd/stc
          go build -ldflags "-s -w -X github.com/centroid-is/stc/pkg/version.Version=${{ github.event.release.tag_name }} -X github.com/centroid-is/stc/pkg/version.Commit=${{ github.sha }}" -o stc-mcp${{ matrix.ext }} ./cmd/stc-mcp

      - name: Package
        shell: bash
        run: |
          ARCHIVE="stc-${{ github.event.release.tag_name }}-${{ matrix.os }}-${{ matrix.arch }}"
          mkdir -p "$ARCHIVE"
          cp stc${{ matrix.ext }} stc-mcp${{ matrix.ext }} "$ARCHIVE/"
          cp LICENSE README.md 2>/dev/null || true
          cp -r editors/vscode "$ARCHIVE/vscode-extension" 2>/dev/null || true
          cp -r .claude/skills "$ARCHIVE/claude-skills" 2>/dev/null || true
          if [ "${{ matrix.os }}" = "windows" ]; then
            7z a "${ARCHIVE}.zip" "$ARCHIVE"
          else
            tar czf "${ARCHIVE}.tar.gz" "$ARCHIVE"
          fi

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: stc-${{ github.event.release.tag_name }}-${{ matrix.os }}-${{ matrix.arch }}.*

  checksums:
    name: Checksums
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download ${{ github.event.release.tag_name }} --repo ${{ github.repository }} --dir assets

      - name: Generate checksums
        run: |
          cd assets
          sha256sum *.tar.gz *.zip > checksums-sha256.txt

      - name: Upload checksums
        uses: softprops/action-gh-release@v2
        with:
          files: assets/checksums-sha256.txt
